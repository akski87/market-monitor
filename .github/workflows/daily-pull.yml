name: Daily availability pull

on:
  schedule:
    - cron: "43 11 * * *"    # 11:43 UTC daily (~7:43am US Eastern) — offset to reduce contention
  workflow_dispatch: {}       # "Run workflow" button for on-demand runs

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the market matrix from registry.json so adding a market needs no workflow edit.
  setup:
    runs-on: ubuntu-latest
    outputs:
      markets: ${{ steps.gen.outputs.markets }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          M=$(python -c "import json;print(json.dumps([m['slug'] for m in json.load(open('registry.json'))['markets']]))")
          echo "Markets: $M"
          echo "markets=$M" >> "$GITHUB_OUTPUT"

  pull:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1          # sequential — each market commits to the same repo
      fail-fast: false
      matrix:
        market: ${{ fromJson(needs.setup.outputs.markets) }}
    env:
      MARKET: ${{ matrix.market }}
    steps:
      - name: Check out the repo (brings along each market's database for history)
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies + headless Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Seed reference dimensions (buildings + unit mix) so new comps and mix updates apply
        run: |
          python engine/pipeline.py seed
          python engine/seed_unit_mix.py

      - name: Scrape availability (best-effort — one site failing won't stop the job)
        continue-on-error: true
        env:
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}   # for 134 Baldwin (Zillow via Zyte)
        run: python engine/scrape.py run

      - name: Refresh the feed + flat exports + site bundle from the database
        run: |
          python engine/pipeline.py clean
          python engine/pipeline.py export
          python engine/export_flat.py
          python engine/build_dashboard.py

      - name: Commit this market's snapshot back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Daily pull ($MARKET) $(date -u +%F)" || { echo "Nothing to commit."; exit 0; }
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected - remote moved. Regenerating from new HEAD (attempt $i/3)..."
            cp "markets/$MARKET/data/market.db" /tmp/keep.db
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            cp /tmp/keep.db "markets/$MARKET/data/market.db"
            python engine/pipeline.py clean
            python engine/pipeline.py export
            python engine/export_flat.py
            python engine/build_dashboard.py
            git add -A
            git commit -m "Daily pull ($MARKET) $(date -u +%F)" || { echo "Nothing to commit after regen."; exit 0; }
          done
          echo "Push failed after 3 attempts."
          exit 1
